name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: unzip NFCBeam.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix build files
        run: |
          cat > NFCBeam_fixed/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "NFCBeam"
          include ':app'
          EOF

          cat > NFCBeam_fixed/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = "1.9.0"
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          EOF

          cat > NFCBeam_fixed/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: Create launcher icons
        run: |
          for dpi in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p NFCBeam_fixed/app/src/main/res/$dpi
            convert -size 48x48 xc:#00D4FF \
              NFCBeam_fixed/app/src/main/res/$dpi/ic_launcher.png
            cp NFCBeam_fixed/app/src/main/res/$dpi/ic_launcher.png \
              NFCBeam_fixed/app/src/main/res/$dpi/ic_launcher_round.png
          done

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Create gradle wrapper
        run: |
          cd NFCBeam_fixed
          gradle wrapper --gradle-version=8.4

      - name: Build Debug APK
        run: |
          cd NFCBeam_fixed
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NFCBeam-debug
          path: NFCBeam_fixed/app/build/outputs/apk/debug/app-debug.apk
