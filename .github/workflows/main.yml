name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Unzip project
        run: unzip NFCBeam.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x NFCBeam_fixed/gradlew

      - name: Build Debug APK
        run: cd NFCBeam_fixed && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: NFCBeam-debug
          path: NFCBeam_fixed/app/build/outputs/apk/debug/app-debug.apk
